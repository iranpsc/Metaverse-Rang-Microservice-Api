[program:laravel-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /home/admin/domains/rgb.irpsc.com/api/artisan queue:work database --sleep=3 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=admin
numprocs=2
redirect_stderr=true
stdout_logfile=/home/admin/domains/rgb.irpsc.com/api/worker.log
stopwaitsecs=3600
